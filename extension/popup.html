<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>Web Subtitle Capture</h1>
    <div id="server-status" class="status disconnected">未连接</div>
  </div>

  <div class="mode-selector">
    <label class="mode-option active">
      <input type="radio" name="captureMode" value="dom" checked>
      <span>DOM 字幕</span>
    </label>
    <label class="mode-option">
      <input type="radio" name="captureMode" value="audio">
      <span>音频转录</span>
    </label>
  </div>

  <div class="controls">
    <button id="btn-start" class="btn primary">开始捕获当前页</button>
    <button id="btn-stop" class="btn danger" style="display:none">停止捕获</button>
  </div>

  <div class="controls">
    <button id="btn-start-all" class="btn secondary">全部开始</button>
    <button id="btn-stop-all" class="btn secondary">全部停止</button>
  </div>

  <div id="current-info" class="info" style="display:none">
    <div class="label">当前页面</div>
    <div id="current-title" class="value"></div>
    <div id="current-platform" class="tag"></div>
  </div>

  <div class="section">
    <h2>活跃会话</h2>
    <div id="sessions" class="sessions">
      <div class="empty">暂无活跃会话</div>
    </div>
  </div>

  <div class="settings-toggle" id="settings-toggle">设置</div>
  <div class="settings" id="settings" style="display:none">
    <div class="setting-row">
      <label>Whisper API Key</label>
      <input type="password" id="whisper-key" placeholder="sk-...">
    </div>
    <div class="setting-row">
      <label>语言</label>
      <select id="whisper-lang">
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="">自动检测</option>
      </select>
    </div>
    <button id="btn-save-settings" class="btn secondary">保存设置</button>
  </div>

  <div class="footer">
    <span>Obsidian: notes/</span>
  </div>

  <script src="platform.js"></script>
  <script src="popup.js"></script>
</body>
</html>
